<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Products & Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:linear-gradient(120deg,#0f2027,#203a43,#2c5364); color:#fff; min-height:100vh; }

/* Top Bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
}
.home-btn{
  padding:10px 18px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border:none;
  border-radius:25px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}
.home-btn:hover{ transform:scale(1.08); }

/* Title */
.title{
  text-align:center;
  font-size:32px;
  margin:20px 0;
  font-weight:600;
}

/* Product Grid */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:40px;
}

/* Product Card */
.card{
  background:rgba(255,255,255,0.07);
  border-radius:20px;
  padding:20px;
  text-align:center;
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.card:hover{ transform:rotateY(8deg) rotateX(6deg) scale(1.05); }
.card img{ width:100%; height:auto; max-height:220px; object-fit:contain; margin:auto; border-radius:12px; animation: float 3s ease-in-out infinite alternate; }
@keyframes float{ from{ transform: translateY(0); } to{ transform: translateY(-10px); } }

.product-name{ font-size:20px; margin:15px 0; font-weight:600; }

/* Add Item Button */
.add-btn{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff512f,#dd2476);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}
.add-btn:hover{ transform:scale(1.1); }

/* Cart Sidebar */
#cartSidebar{
  position:fixed;
  top:0;
  right:-350px;
  width:350px;
  height:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:20px;
  box-shadow: -5px 0 20px rgba(0,0,0,0.5);
  transition:0.5s;
  overflow-y:auto;
  z-index:100;
}
#cartSidebar.active{ right:0; }
#cartSidebar h2{ text-align:center; margin-bottom:20px; }
.cart-item{ display:flex; align-items:center; margin-bottom:15px; }
.cart-item img{ width:50px; height:50px; object-fit:cover; border-radius:8px; margin-right:10px; }
.cart-item-name{ flex:1; font-size:16px; }
.cart-item-qty{ margin:0 10px; }
.cart-item-price{ margin-left:10px; font-weight:600; color:#ffd700; }
.remove-btn{ padding:4px 8px; border:none; border-radius:6px; background:#ff6b6b; color:#fff; cursor:pointer; transition:0.3s; }
.remove-btn:hover{ transform:scale(1.1); }

/* Confirm Button in Cart */
#confirmCartBtn{
  padding:12px 20px;
  width:100%;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#000;
  font-weight:600;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}
#confirmCartBtn:hover{ transform:scale(1.05); }

/* Cart Toggle Button */
#cartToggle{
  position:fixed;
  top:50%;
  right:10px;
  transform:translateY(-50%);
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#7fe0c8,#a6b4f1);
  cursor:pointer;
  font-weight:600;
  z-index:101;
  transition:0.3s;
}
#cartToggle:hover{ transform:scale(1.1); }

/* Responsive */
@media(max-width:600px){
  .title{ font-size:24px; }
  #cartSidebar{ width:80%; }
}
</style>
</head>
<body>

<div class="top-bar">
  <button class="home-btn" onclick="location.href='index.html'">Home</button>
  <h2>Add Products to Cart</h2>
</div>

<h1 class="title">Select More Products</h1>

<div class="products" id="productsContainer">
  <!-- Product Cards will be injected by JS -->
</div>

<!-- Cart Toggle -->
<button id="cartToggle" onclick="toggleCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>

<!-- Cart Sidebar -->
<div id="cartSidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <button id="confirmCartBtn" onclick="confirmOrder()">Confirm Order</button>
</div>

<script>
// Product List with Prices
const productList = [
  {name:"Paper Drone", img:"images/drone1.png", price:25},
  {name:"Paper Dish", img:"images/dish1-removebg-preview.png", price:10},
  {name:"Paper Plates", img:"images/plain dish1.png", price:15},
  {name:"Paper Cup", img:"images/paper cup1.png", price:5},
  {name:"Paper Kappa Green Thali", img:"images/green kappa thali1.png", price:50},
  {name:"Paper Silver Plain Thali", img:"images/WhatsApp_Image_2026-02-08_at_19.43.33__1_-removebg-preview.png", price:60},
  {name:"Paper Green Kappa Thali", img:"images/WhatsApp_Image_2026-02-08_at_19.43.33-removebg-preview.png", price:55},
  {name:"Paper Silver Kappa Thali", img:"images/silver_kappa-removebg-preview (1).png", price:65}
];

// Load products dynamically
const productsContainer = document.getElementById('productsContainer');
productList.forEach(prod=>{
  const card = document.createElement('div');
  card.classList.add('card');
  card.innerHTML = `
    <img src="${prod.img}" alt="${prod.name}">
    <div class="product-name">${prod.name}</div>
    <button class="add-btn" onclick="addToCart('${prod.name}','${prod.img}',${prod.price})">Add Item</button>
  `;
  productsContainer.appendChild(card);
});

// Cart Logic
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function addToCart(name,img,price){
  const index = cart.findIndex(item => item.name===name);
  if(index!==-1){
    cart[index].qty +=1;
  }else{
    cart.push({name:name,img:img,qty:1, price:price});
  }
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

// Render Cart //

function renderCart(){
  const cartItems = document.getElementById('cartItems');
  cartItems.innerHTML = '';

  let totalAmount = 0; // Total for all products

  cart.forEach(item=>{
    const totalPrice = item.price * item.qty;
    totalAmount += totalPrice;

    const div = document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML = `
      <img src="${item.img}" alt="${item.name}">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-item-qty">Qty: ${item.qty}</div>
      <div class="cart-item-price">₹${totalPrice.toLocaleString('en-IN')}</div>
      <button class="remove-btn" onclick="removeFromCart('${item.name}')">Remove</button>
    `;
    cartItems.appendChild(div);
  });

  // Display total amount above confirm button
  let totalDiv = document.getElementById('totalAmountDiv');
  if(!totalDiv){
    totalDiv = document.createElement('div');
    totalDiv.id = 'totalAmountDiv';
    totalDiv.style.textAlign = 'center';
    totalDiv.style.fontWeight = '600';
    totalDiv.style.fontSize = '18px';
    totalDiv.style.marginBottom = '10px';
    const confirmBtn = document.getElementById('confirmCartBtn');
    confirmBtn.parentNode.insertBefore(totalDiv, confirmBtn);
  }
  totalDiv.innerText = `Total Amount: ₹${totalAmount.toLocaleString('en-IN')}`;

  document.getElementById('cartCount').innerText = cart.reduce((a,b)=>a+b.qty,0);
}



// Remove from cart
function removeFromCart(name){
  cart = cart.filter(item=>item.name!==name);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

// Toggle Cart Sidebar
function toggleCart(){
  document.getElementById('cartSidebar').classList.toggle('active');
}

// Confirm Order
function confirmOrder(){

if(cart.length===0){
alert("Your cart is empty!");
return;
}

localStorage.setItem("cart", JSON.stringify(cart));

window.location.href="checkout.html";



  // Save cart and go to checkout
  localStorage.setItem('cart',JSON.stringify(cart));
  window.location.href = 'checkout.html'; // Next page we'll build
}

// Initialize
renderCart();
</script>

</body>
</html>
