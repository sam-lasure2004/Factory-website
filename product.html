<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  min-height:100vh;
}

/* Top Bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
}

.home-btn{
  padding:10px 18px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border:none;
  border-radius:25px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}
.home-btn:hover{
  transform:scale(1.08);
}

/* Title */
.title{
  text-align:center;
  font-size:32px;
  margin:20px 0;
  font-weight:600;
}

/* Product Grid */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  padding:40px;
}

/* Product Card */
.card{
  background:rgba(255,255,255,0.07);
  border-radius:20px;
  padding:20px;
  text-align:center;
  transition:0.4s;
  transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card:hover{
  transform:rotateY(8deg) rotateX(6deg) scale(1.05);
  
}


.card img{
  width:100%;
  height:auto;
  max-height:220px;
  object-fit:contain;
  display:block;
  margin:auto;
  
}

.rotate{
  animation: rotateSlow 10s linear infinite;
}


  @keyframes rotateSlow {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

.no-rotate {
  animation: none;
}

.zoom-out {
  animation: zoomOut 1s ease-in-out infinite alternate;
}

@keyframes zoomOut {
  from { transform: scale(1); }
  to { transform: scale(0.85); }
}




.product-name{
  font-size:20px;
  margin:15px 0;
  font-weight:600;
}

/* Button */
.book-btn{
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff512f,#dd2476);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}
.book-btn:hover{
  transform:scale(1.1);
}

/* Scroll Top Button */
#scrollTop{
  position:fixed;
  bottom:25px;
  right:25px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:linear-gradient(45deg,#00dbde,#fc00ff);
  color:white;
  font-size:20px;
  cursor:pointer;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  animation:float 1.5s infinite alternate;
}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(-8px)}
}

/* Responsive */
@media(max-width:600px){
  .title{font-size:24px;}
}
</style>
</head>

<button id="scrollTop" onclick="scrollToTop()">↑</button>

<script>
// Show button when scroll down
window.onscroll=function(){
  if(document.documentElement.scrollTop>200){
    document.getElementById("scrollTop").style.display="block";
  }else{
    document.getElementById("scrollTop").style.display="none";
  }
};

// Smooth auto scroll to top
function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:'smooth'
  });
}
