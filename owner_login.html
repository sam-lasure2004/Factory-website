<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Glass Card */
.login-box{
  width:380px;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.login-box h2{
  color:#fff;
  margin-bottom:25px;
  letter-spacing:1px;
}

/* Inputs */
.input-group{
  position:relative;
  margin:20px 0;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.4);
  background:transparent;
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:#00e0ff;
  box-shadow:0 0 10px #00e0ff;
}

/* Button */
button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg,#00e0ff,#00ffa6);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffa6;
}

.message{
  margin-top:15px;
  font-size:14px;
  color:#fff;
}
.error{
  color:#ff6b6b;
}
.success{
  color:#00ffa6;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>OWNER LOGIN</h2>

  <div class="input-group">
    <input type="text" id="username" placeholder="Username">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button onclick="login()">Login</button>

  <div class="message" id="msg"></div>
</div>

<script>
function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");

  // Validation
  if(user === "" || pass === ""){
    msg.innerHTML = "⚠️ Please fill all fields";
    msg.className = "message error";
    return;
  }

  // Demo credentials (change later)
  if(user === "owner" && pass === "1234"){
    msg.innerHTML = "✅ Hello Sir, Welcome!";
    msg.className = "message success";

    setTimeout(()=>{
      window.location.href="dashboard.html";
    },1500);
  }
  else{
    msg.innerHTML = "❌ Invalid Username or Password";
    msg.className = "message error";
  }
}
</script>

</body>
</html>
