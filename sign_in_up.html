<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* ANIMATED BACKGROUND */
body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(270deg,#667eea,#97f8e8,#6dd5ed,#8bdcf0);
  background-size:600% 600%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* GLASS 3D CARD */
.container{
  position:relative;
  width:950px;
  max-width:95%;
  height:560px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  border-radius:25px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.3),
    inset 0 0 20px rgba(255,255,255,0.15);
  overflow:hidden;
  transition:.6s;
  border:1px solid rgba(255,255,255,0.2);
}

/* FORMS */
.form-container{
  position:absolute;
  top:0;
  height:100%;
  width:50%;
  padding:50px;
  transition:.6s ease-in-out;
}

.sign-in{ left:0; z-index:2; }
.sign-up{ left:0; opacity:0; z-index:1; }

.container.active .sign-in{
  transform:translateX(100%);
  opacity:0;
}

.container.active .sign-up{
  transform:translateX(100%);
  opacity:1;
  z-index:5;
}

h2{
  margin-bottom:25px;
  font-weight:600;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* INPUT BOX */
.input-box{
  position:relative;
  margin:22px 0;
}

.input-box input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.3);
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
  font-size:14px;
}

.input-box label{
  position:absolute;
  left:12px;
  top:14px;
  background:transparent;
  padding:0 6px;
  font-size:13px;
  color:#eee;
  transition:.3s;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:11px;
  color:#fff;
  background:rgba(0,0,0,0.2);
  border-radius:6px;
}

/* PASSWORD EYE */
.eye{
  position:absolute;
  right:12px;
  top:14px;
  cursor:pointer;
  font-size:15px;
  color:#fff;
}

/* BUTTON */
button{
  margin-top:18px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

button:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 12px 28px rgba(0,0,0,0.35);
}

/* ERROR TEXT */
.error{
  color:#ffdddd;
  font-size:13px;
  margin-top:6px;
}

/* OVERLAY */
.overlay-container{
  position:absolute;
  top:0;
  left:50%;
  width:50%;
  height:100%;
  overflow:hidden;
  transition:.6s;
  border-left:1px solid rgba(255,255,255,0.3);
}

.container.active .overlay-container{
  transform:translateX(-100%);
}

.overlay{
  background:linear-gradient(135deg,#ffecd2,#faef8c);
  color:#222;
  height:100%;
  width:200%;
  position:relative;
  left:-100%;
  transition:.6s;
}

.container.active .overlay{
  transform:translateX(50%);
}

.overlay-panel{
  position:absolute;
  width:50%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  text-align:center;
}

.overlay-panel h2{
  color:#222;
  text-shadow:none;
}

.overlay-left{ transform:translateX(-20%); }
.container.active .overlay-left{ transform:translateX(0); }

.overlay-right{ right:0; }

.switch-btn{
  margin-top:25px;
  background:#fff;
  color:#000;
}

/* MOBILE */
@media(max-width:768px){
  .container{ height:auto; }
  .form-container{ width:100%; position:relative; }
  .overlay-container{ display:none; }
}


/* HOME BUTTON PREMIUM STYLE */
.home-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
  padding: 13px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  color: rgb(5, 5, 5);
  background: linear-gradient(135deg, #a6b4f1, #7fe0c8);
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  position: relative;
  overflow: hidden;
  transition: all 0.35s ease;
}

/* Glow effect */
.home-btn::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  top: -10%;
  left: -100%;
  transition: 0.6s;
}

.home-btn:hover::before {
  left: 100%;
}

/* Hover lift */
.home-btn:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 12px 25px rgba(0,0,0,0.35);
}

/* Click press effect */
.home-btn:active {
  transform: scale(0.96);
}

/* Icon animation */
.home-icon {
  font-size: 18px;
  transition: transform 0.3s ease;
}

.home-btn:hover .home-icon {
  transform: translateY(-3px) rotate(-10deg);
}

</style>


</head>
<body>

<div class="container" id="container">

<!-- SIGN IN -->

<form autocomplete="off">

<div class="form-container sign-in">
  <h2>Sign In</h2>

  <div class="input-box">
    <input type="text" id="loginName" placeholder=" " autocomplete="off"  required>
    <label>Full Name</label>
  </div>

  <div class="input-box">
    <input type="email" id="loginEmail" placeholder=" " required>
    <label>Email</label>
  </div>
  
  
  <div class="input-box">
<input type="text" id="loginmobile" placeholder=" " autocomplete="off" required>
<label>Mobile Number</label>
</div>

  <div class="input-box">
    <input type="password" id="loginPass" placeholder=" " autocomplete="off"  required>
    <label>Password</label>
    <span class="eye" onclick="togglePassword('loginPass')">👁️</span>
  </div>

  <div class="error" id="loginError"></div>

<button type="button" onclick="validateLogin()">Login</button>
  <!--button type="submit">Sign In</button-->

<a href="index.html" class="home-btn">
  <span class="home-icon">🏠</span>
  <span>Home Page</span>
</a>

</div>
</form>



<!-- SIGN UP -->

<form id="signupForm" autocomplete="off">

<div class="form-container sign-up">
  <h2>Create Account</h2>

  <div class="input-box">
    <input type="text" id="name" placeholder=" " autocomplete="off" required>
    <label>Full Name</label>
  </div>

  <div class="input-box">
    <input type="email" id="email" placeholder=" " autocomplete="off" required>
    <label>Email</label>
  </div>


  <div class="input-box">
<input type="text" id="signupmobile" placeholder=" " autocomplete="off" required>
<label>Mobile Number</label>
</div>


  <div class="input-box">
    <input type="password" id="pass" placeholder=" " autocomplete="off" required>
    <label>Password</label>
    <span class="eye" onclick="togglePassword('pass')">👁️</span>
  </div>

  <div class="error" id="signupError"></div>

  <button type="button" onclick="validateSignup()">Create Account</button>
<!--button type="submit">Sign Up</button-->
<a href="index.html" class="home-btn">
  <span class="home-icon">🏠</span>
  <span>Back to Home</span>
</a>


</div>
</form>

<!-- OVERLAY -->
<div class="overlay-container">
  <div class="overlay">

    <div class="overlay-panel overlay-left">
      <h2>Welcome Back!</h2>
      <p>SAI PRASAD PAPER PRODUCT</p>
      <button class="switch-btn" id="signInBtn">Sign In</button>
    </div>

    <div class="overlay-panel overlay-right">
      <h2>Hello Customer!</h2>
      <p>Join and explore eco-friendly products</p>
      <button class="switch-btn" id="signUpBtn">Sign Up</button>
    </div>

  </div>
</div>

<script>
const container = document.getElementById('container');
const signUpBtn = document.getElementById('signUpBtn');
const signInBtn = document.getElementById('signInBtn');

signUpBtn.onclick = () => container.classList.add("active");
signInBtn.onclick = () => container.classList.remove("active");

/* PASSWORD TOGGLE */
function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

/* LOGIN CHECK (Name + Email + Password) */
function validateLogin(){
  const name  = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPass').value.trim();
  const err   = document.getElementById('loginError');

  // Basic validations
  if(name.length < 3){
    err.innerText = "Enter valid full name";
    return;
  }
  if(!email.includes("@")){
    err.innerText = "Enter valid email";
    return;
  }
  if(pass.length < 6){
    err.innerText = "Password must be 6+ characters";
    return;
  }

  const storedUser = JSON.parse(localStorage.getItem(email));

  // Account not found
  if(!storedUser){
    err.innerHTML = `Account does not exist. 
      <span style="color:blue;cursor:pointer;" onclick="openSignup()">Create account</span>`;
    return;
  }

  // Name mismatch
  if(storedUser.name.toLowerCase() !== name.toLowerCase()){
    err.innerText = "Name does not match this account";
    return;
  }

  // Password mismatch
  if(storedUser.password !== pass){
    err.innerText = "Wrong password";
    return;
  }
// Success
err.innerText = "";

// SAVE LOGIN SESSION
localStorage.setItem("loggedUser", email);

// clear previous cart
localStorage.removeItem("cart");

window.location.href = "product_login_successful.html";
}

/* OPEN SIGNUP FROM MESSAGE */
function openSignup(){
  container.classList.add("active");
}

/* SIGNUP SAVE ACCOUNT */
function validateSignup(){
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pass  = document.getElementById('pass').value.trim();
  const err   = document.getElementById('signupError');

  if(name.length < 3){
    err.innerText = "Enter full name";
    return;
  }
  if(!email.includes("@")){
    err.innerText = "Enter valid email";
    return;
  }
  if(pass.length < 6){
    err.innerText = "Password must be 6+ characters";
    return;
  }

  // Prevent duplicate account
  if(localStorage.getItem(email)){
    err.innerText = "Account already exists. Please Sign In.";
    return;
  }

  // Save account
 const mobile = document.getElementById('signupmobile').value.trim();

if(mobile.length < 10){
err.innerText="Enter valid mobile number";
return;
}

localStorage.setItem(email, JSON.stringify({
name: name,
password: pass,
mobile: mobile
}));

// create login session
//localStorage.setItem("loggedUser", email);

// Success
err.innerText = "";

// SAVE LOGIN SESSION
localStorage.setItem("loggedUser", email);

// clear previous cart
localStorage.removeItem("cart");

window.location.href = "product_login_successful.html";
}
</script>

<script>
document.querySelectorAll('.home-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    document.body.style.opacity = '0';
    document.body.style.transition = '0.4s';

    setTimeout(() => {
      window.location.href = this.href;
    }, 400);
  });
});
</script>


</body>
</html>
