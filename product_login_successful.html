<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Login Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* RESET & FONT */
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#667eea,#97f8e8,#6dd5ed,#8bdcf0); overflow-x:hidden; }

/* CONTAINER */
.container{
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 40px;
  width: 90%;
  max-width: 800px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.15);
  position: relative;
  animation: fadeIn 1s ease forwards;
}

/* TITLE */
h1{
  font-size: 36px;
  margin-bottom: 15px;
  color: #fff;
  text-shadow: 0 3px 8px rgba(0,0,0,0.3);
  animation: slideDown 1s ease forwards;
}
p{
  color:#fff;
  margin-bottom: 30px;
  font-size: 18px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* PRODUCT CARD */
.product-card{
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px;
  max-width: 300px;
  margin: 0 auto 30px;
  perspective: 1000px;
  transition: transform 0.5s ease;
}
.product-card:hover{
  transform: rotateY(15deg) rotateX(10deg) scale(1.05);
}
.product-card img{
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  animation: float 3s ease-in-out infinite alternate;
}
.product-card h2{
  font-size: 22px;
  color: #fff;
  margin-bottom: 10px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* BUTTONS */
.btn{
  padding: 12px 30px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  margin: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  color:#fff;
}
.confirm-btn{
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.confirm-btn:hover{
  transform: translateY(-3px) scale(1.05);
  box-shadow:0 12px 28px rgba(0,0,0,0.5);
}
.back-btn{
  background: linear-gradient(135deg,#7fe0c8,#a6b4f1);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.back-btn:hover{
  transform: translateY(-3px) scale(1.05);
  box-shadow:0 12px 28px rgba(0,0,0,0.5);
}

/* FLOAT ANIMATION */
@keyframes float{
  from{ transform: translateY(0); }
  to{ transform: translateY(-15px); }
}

/* FADE IN / SLIDE DOWN */
@keyframes fadeIn{
  from{ opacity:0; transform: translateY(30px);}
  to{ opacity:1; transform: translateY(0);}
}
@keyframes slideDown{
  from{ opacity:0; transform: translateY(-30px);}
  to{ opacity:1; transform: translateY(0);}
}

/* CONFETTI */
.confetti-piece{
  position: fixed;
  width: 10px; height: 10px;
  background-color: #fff;
  opacity: 0.8;
  top: 0;
  animation: fall 3s linear infinite;
}
@keyframes fall{
  0%{ transform: translateY(0) rotate(0deg); }
  100%{ transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <h1>Welcome Customer 🎉</h1>
  <p>Your login was successful. Review your product below.</p>

  <div class="product-card">
    <img id="productImg" src="" alt="Selected Product">
    <h2 id="productName">Product Name</h2>
  </div>

  <button class="btn confirm-btn" onclick="confirmOrder()">Confirm Order</button>
  <button class="btn back-btn" onclick="location.href='add_product_cart.html'">Back to Products</button>
</div>

<!-- CONFETTI -->
<div id="confettiContainer"></div>

<script>
// Load selected product from localStorage
const productName = localStorage.getItem('selectedProduct') || "Your Product";
const productImg = localStorage.getItem('selectedProductImg') || "images/placeholder.png";

document.getElementById('productName').innerText = productName;
document.getElementById('productImg').src = productImg;

// Confirm Order
function confirmOrder(){
  alert(`Your order for "${productName}" is confirmed! 🎉`);
  // You can redirect to a thank-you page or home
  window.location.href = 'product.html';
}

// Confetti animation
function createConfetti(){
  const container = document.getElementById('confettiContainer');
  for(let i=0;i<50;i++){
    const piece = document.createElement('div');
    piece.classList.add('confetti-piece');
    piece.style.left = Math.random()*window.innerWidth+'px';
    piece.style.backgroundColor = `hsl(${Math.random()*360}, 80%, 60%)`;
    piece.style.animationDuration = 2+Math.random()*3+'s';
    container.appendChild(piece);
  }
}
createConfetti();
</script>

</body>
</html>
